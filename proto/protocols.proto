syntax = "proto3";

package grpcdemo;

service DemoService {
  rpc Add(AddRequest) returns (AddResponse);
  rpc CountUp(CountRequest) returns (stream CountResponse);
  rpc Sum(stream NumberRequest) returns (SumResponse);
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

message AddRequest {
  int64 a = 1;
  int64 b = 2;
}

message AddResponse {
  int64 result = 1;
}

message CountRequest {
  int32 count = 1;
}

message CountResponse {
  int32 value = 1;
}

message NumberRequest {
  int64 value = 1;
}

message SumResponse {
  int64 result = 1;
}

message ChatMessage {
  string text = 1;
}

[package]
name = "protocols"
version = "0.1.0"
edition = "2024"
default-run = "protocols"

[dependencies]
axum = { version = "0.8.9", features = ["ws"] }
futures-util = "0.3.32"
jsonrpsee = { version = "0.26.0", features = ["server"] }
rmcp = { version = "1.7.0", default-features = false, features = ["server", "client", "macros", "schemars", "transport-io", "transport-child-process"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }
tokio-stream = { version = "0.1.18", features = ["sync"] }

[[bin]]
name = "mcp"
path = "src/bin/mcp/server.rs"

[[bin]]
name = "mcp_client"
path = "src/bin/mcp/client.rs"
